name: Build iOS unsigned IPA
on:
  push:
  workflow_dispatch:
jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci || npm install
      - name: Sync Capacitor iOS
        run: npx cap sync ios
      - name: Install CocoaPods
        run: cd ios/App && pod install
      - name: Archive (UNSIGNED — no Apple account needed)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App \
            -configuration Release -sdk iphoneos \
            -archivePath "$PWD/build/App.xcarchive" archive \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM=""
      - name: Package unsigned .ipa
        run: |
          cd ios/App/build
          mkdir -p Payload
          cp -R App.xcarchive/Products/Applications/App.app Payload/App.app
          zip -qr "Firas AI (unsigned).ipa" Payload
          ls -lh "Firas AI (unsigned).ipa"
      - uses: actions/upload-artifact@v4
        with:
          name: Firas-AI-iphone-ipa
          path: ios/App/build/Firas AI (unsigned).ipa
          if-no-files-found: error
